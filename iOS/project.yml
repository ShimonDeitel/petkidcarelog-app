name: Petkidcarelog
options:
  bundleIdPrefix: com.shimondeitel.petkidcarelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Petkidcarelog:
    type: application
    platform: iOS
    sources:
      - path: Petkidcarelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petkidcarelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Petkidcarelog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PetkidcarelogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PetkidcarelogTests
      - path: Petkidcarelog.storekit
    dependencies:
      - target: Petkidcarelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petkidcarelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PetkidcarelogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PetkidcarelogUITests
    dependencies:
      - target: Petkidcarelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petkidcarelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Petkidcarelog:
    build:
      targets:
        Petkidcarelog: all
        PetkidcarelogTests: [test]
        PetkidcarelogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Petkidcarelog.storekit
    test:
      config: Debug
      storeKitConfiguration: Petkidcarelog.storekit
      targets:
        - PetkidcarelogTests
        - PetkidcarelogUITests
    archive:
      config: Release
